{% extends 'admin_base.html' %}
{% block content %}<section class="card"><h1>Bookings</h1><table><tr><th>ID</th><th>User</th><th>Listener</th><th>Date</th><th>Time</th><th>Mode</th></tr>{% for b in bookings %}<tr><td>{{ b.id }}</td><td>{{ b.full_name }} ({{ b.email }})</td><td>{{ b.listener_name or 'Any' }}</td><td>{{ b.session_date }}</td><td>{{ b.session_time }}</td><td>{{ b.service_mode }}</td></tr>{% endfor %}</table></section>{% endblock %}
